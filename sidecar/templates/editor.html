<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Capsule -- openhost-gemini</title>
  <link rel="stylesheet" href="/static/editor.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>Capsule editor</h1>
      <span class="filename" id="current-file">(no file)</span>
      <span class="spacer"></span>
      <a href="/">Back to landing</a>
    </header>

    <aside class="sidebar">
      <div class="sidebar-actions">
        <button id="btn-new" type="button">New file</button>
        <button id="btn-delete" type="button">Delete</button>
      </div>
      <nav id="file-list"></nav>
    </aside>

    <section class="main">
      <div class="toolbar">
        <span class="hint">Edit gemtext directly. <a href="https://geminiprotocol.net/docs/gemtext-specification.gmi" target="_blank" rel="noopener">Gemtext reference</a>.</span>
        <span class="spacer"></span>
        <button id="btn-save" type="button" class="primary">Save</button>
        <span id="editor-status" class="editor-status">No file loaded</span>
      </div>
      <div class="editor-host-wrap">
        <textarea id="editor-host"
                  spellcheck="true"
                  autocomplete="off"
                  autocorrect="off"
                  autocapitalize="off"
                  wrap="soft"
                  placeholder="Pick a file from the sidebar or click 'New file' to start."></textarea>
      </div>
    </section>
  </div>

  <script type="module" src="/static/editor.js"></script>
</body>
</html>
