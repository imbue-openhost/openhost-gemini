<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Capsule -- openhost-gemini</title>
  <link rel="stylesheet" href="/static/editor.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>Capsule editor</h1>
      <span style="color:#8b949e; font-size:13px;" id="current-file">(no file)</span>
      <span class="spacer"></span>
      <a href="/">Back to landing</a>
    </header>

    <aside class="sidebar">
      <div class="sidebar-actions">
        <button id="btn-new" type="button">New file</button>
        <button id="btn-delete" type="button">Delete</button>
      </div>
      <nav id="file-list"></nav>
    </aside>

    <section class="main">
      <div class="toolbar">
        <div id="shape-bar"></div>
        <span class="spacer"></span>
        <button id="btn-source" type="button" class="shape-btn">View source</button>
        <button id="btn-save" type="button" class="shape-btn">Save</button>
        <span id="editor-status" class="editor-status">No file loaded</span>
      </div>
      <div class="editor-host-wrap">
        <div id="editor-host" contenteditable="true" spellcheck="true"></div>
      </div>
    </section>
  </div>

  <script type="module" src="/static/editor.js"></script>
</body>
</html>
